# ============================================================================
# AI tools declaration
# ============================================================================

ai_tools_used:
  - "ChatGPT (Free)"
  - "Claude (Free)"

ai_usage_summary: |
  ChatGPT and Claude were used during development as engineering assistants for
  brainstorming architecture, reviewing feature engineering, improving reasoning
  generation, writing tests, identifying edge cases, and reviewing implementation
  decisions.

  All ranking logic, feature weighting, heuristics, calibration, debugging,
  validation, testing, profiling, and final engineering decisions were performed
  manually and iteratively by the author.

  No hosted LLM APIs are used anywhere during execution of rank.py.
  The ranking pipeline is fully deterministic, CPU-only, offline, and performs
  no external network requests during inference.

# ============================================================================
# Approach summary
# ============================================================================

methodology_summary: |
  Deterministic feature-engineered candidate ranking system designed specifically
  for the released Redrob JD.

  Candidate scoring combines multiple independently weighted components including
  title alignment, production retrieval/ranking experience, skill credibility,
  behavioral hiring signals, experience fit, career trajectory, location,
  consistency validation, and explicit JD disqualifiers.

  Rather than relying on embedding similarity alone, the ranker validates evidence
  across career history, skills, production achievements, recruiter signals,
  assessments, and behavioral consistency.

  Candidate explanations are generated deterministically from actual profile
  evidence using multiple evidence-driven sentence structures to maximize factual
  specificity while avoiding repetitive template output.

  Runtime on the complete 100,000 candidate dataset:
  approximately 21 seconds wall-clock using under 2 GB RAM on an Apple M4 CPU.

